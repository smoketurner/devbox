name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build musl (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    env:
      TARGET: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build (musl static, all crates)
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          targets: ci
          # Build from scratch: a fully cache-hit bake reports the `type=local`
          # export as succeeding but never materializes the binaries on the
          # runner, so the assemble step below finds nothing. CI pre-populates
          # the cache for the tagged commit, so without this a release always
          # hits the empty-export path. Releases are infrequent; a clean build
          # is also better for reproducibility.
          no-cache: true
      - name: Assemble release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          # The devbox-cli crate builds a binary named `devbox`; server/agent
          # match their crate names. Map each to a crate-named release asset.
          cp "target/${TARGET}/release/devbox"        "dist/devbox-cli-${TARGET}"
          cp "target/${TARGET}/release/devbox-server" "dist/devbox-server-${TARGET}"
          cp "target/${TARGET}/release/devbox-agent"  "dist/devbox-agent-${TARGET}"
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-${{ matrix.target }}
          path: dist/*
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist
      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum -- * > SHA256SUMS
          cat SHA256SUMS
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            ./dist/*
