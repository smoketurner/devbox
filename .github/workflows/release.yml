name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build musl (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    env:
      TARGET: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build (musl static, all crates)
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          targets: ci
      - name: Assemble release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          # The devbox-cli crate builds a binary named `devbox`; server/agent
          # match their crate names. Map each to a crate-named release asset.
          cp "target/${TARGET}/release/devbox"        "dist/devbox-cli-${TARGET}"
          cp "target/${TARGET}/release/devbox-server" "dist/devbox-server-${TARGET}"
          cp "target/${TARGET}/release/devbox-agent"  "dist/devbox-agent-${TARGET}"
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-${{ matrix.target }}
          path: dist/*
          retention-days: 7

  build-macos:
    name: Build signed CLI (macos-arm64)
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      TARGET: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install build dependencies
        run: |
          brew trust aws/tap
          brew install go cmake
      - name: Setup Rust toolchain
        run: |
          rustup show
          rustup target add aarch64-apple-darwin
      - name: Build CLI
        run: cargo build --release --locked --target "${TARGET}" -p devbox-cli
      - name: Import Apple Developer Certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12
      - name: Code sign CLI
        env:
          APPLE_CERTIFICATE_NAME: ${{ secrets.APPLE_CERTIFICATE_NAME }}
        run: |
          /usr/bin/codesign --force --sign "$APPLE_CERTIFICATE_NAME" \
            --options runtime --timestamp "target/${TARGET}/release/devbox"
          /usr/bin/codesign --verify --verbose "target/${TARGET}/release/devbox"
      - name: Notarize CLI
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_ID_PASSWORD"
          ditto -c -k --keepParent "target/${TARGET}/release/devbox" devbox-notarize.zip
          xcrun notarytool submit devbox-notarize.zip \
            --keychain-profile "notarytool-profile" --wait
          rm -f devbox-notarize.zip
      - name: Assemble release artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${TARGET}/release/devbox" "dist/devbox-cli-${TARGET}"
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-${{ env.TARGET }}
          path: dist/*
          retention-days: 7
      - name: Cleanup macOS keychain
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true

  release:
    name: Publish GitHub Release
    needs: [build, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist
      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum -- * > SHA256SUMS
          cat SHA256SUMS
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            ./dist/*
