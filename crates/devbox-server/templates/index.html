<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Devbox Dashboard</title>
    <link rel="stylesheet" href="/static/css/output.css">
</head>
<body class="bg-devbox-bg text-gray-200 min-h-screen">
    <div class="max-w-6xl mx-auto px-6 py-8">
        <h1 class="text-2xl font-bold text-white mb-6">Devbox Dashboard</h1>
        <div class="card overflow-hidden p-0">
            <table class="w-full">
                <thead>
                    <tr class="bg-devbox-raised">
                        <th class="table-header">ID</th>
                        <th class="table-header">State</th>
                        <th class="table-header">Instance Type</th>
                        <th class="table-header">Instance ID</th>
                        <th class="table-header">Owner</th>
                        <th class="table-header">Created</th>
                    </tr>
                </thead>
                <tbody>
                    {% for devbox in devboxes %}
                    <tr class="hover:bg-devbox-raised/50 transition-colors">
                        <td class="table-cell font-mono text-xs">{{ devbox.id }}</td>
                        <td class="table-cell"><span class="status-{{ devbox.state }}">{{ devbox.state }}</span></td>
                        <td class="table-cell">{{ devbox.instance_type }}</td>
                        <td class="table-cell font-mono text-xs">{{ devbox.instance_id }}</td>
                        <td class="table-cell">{{ devbox.owner }}</td>
                        <td class="table-cell text-gray-400">{{ devbox.created_at }}</td>
                    </tr>
                    {% endfor %}
                    {% if devboxes.is_empty() %}
                    <tr>
                        <td colspan="6" class="table-cell text-center text-gray-500 py-8">No devboxes found.</td>
                    </tr>
                    {% endif %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
